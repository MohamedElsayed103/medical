# ── Healthcare SaaS — Docker Compose (Development) ──
version: "3.9"

x-app-env: &app-env
  DJANGO_SETTINGS_MODULE: config.settings.development
  SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
  DEBUG: "True"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  DB_NAME: healthcare
  DB_USER: healthcare_user
  DB_PASSWORD: ${DB_PASSWORD:-healthcare_pass}
  DB_HOST: db
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_ENDPOINT_URL: http://minio:9000
  KEYCLOAK_URL: http://keycloak:8080
  KEYCLOAK_REALM: healthcare-saas
  OIDC_RP_CLIENT_ID: web-app
  OIDC_RP_CLIENT_SECRET: ${OIDC_RP_CLIENT_SECRET:-change-me}
  AI_SERVICE_BASE_URL: http://ai-service:5000
  FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}

services:
  # ── PostgreSQL 16 ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: healthcare_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-healthcare_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare_user -d healthcare"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── RabbitMQ ──
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO (S3-compatible storage) ──
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Keycloak ──
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_DATABASE: healthcare
      KC_DB_USERNAME: healthcare_user
      KC_DB_PASSWORD: ${DB_PASSWORD:-healthcare_pass}
      KC_HEALTH_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy

  # ── Django Web ──
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate_schemas --shared &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      <<: *app-env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started

  # ── Celery Worker ──
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A config worker
        -l info
        -Q default,ai_tasks,notifications
        --concurrency=4
    environment:
      <<: *app-env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Celery Beat (scheduler) ──
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A config beat
        -l info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *app-env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Nginx (reverse proxy) ──
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
